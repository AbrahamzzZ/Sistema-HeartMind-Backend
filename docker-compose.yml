services:
  mysql:
    image: mysql:8.0
    container_name: cardiovascular_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cardiovascular_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d

  php:
    build:
      context: ./api
    container_name: cardiovascular_api
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./api:/var/www/html
      - ./api/php.ini:/usr/local/etc/php/conf.d/uploads.ini

    environment:
      DB_HOST: mysql
      DB_NAME: cardiovascular_db
      DB_USER: root
      DB_PASSWORD: root123
      JWT_SECRET: HeartMindSecretKey2026SuperSecureJWT123456789
      CLOUD_NAME: _TU_CLOUD_NAME
      API_KEY: TU_API_KEY
      API_SECRET: TU_API_SECRET
      
    depends_on:
      - mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cardiovascular_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root123
    depends_on:
      - mysql

volumes:
  mysql_data: